version: 2
updates:
  # Dépendances npm — PRs automatiques si CVE ou mise à jour disponible
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore"
