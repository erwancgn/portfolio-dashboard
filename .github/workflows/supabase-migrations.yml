# Applique les migrations Supabase sur la base de production uniquement lorsque
# des fichiers sous supabase/migrations/ changent (aligné avec un merge sur main,
# comme le déploiement Vercel — sans dépendre de Vercel pour la DB).
#
# Secrets GitHub à configurer (Settings → Secrets and variables → Actions) :
#   SUPABASE_ACCESS_TOKEN   — https://supabase.com/dashboard/account/tokens
#   SUPABASE_PROJECT_ID     — ref du projet (URL dashboard : /project/<ref>)
#   SUPABASE_DB_PASSWORD    — mot de passe DB (Settings → Database)
#
# Déclenchement manuel possible (workflow_dispatch) pour rejouer les migrations.

name: Supabase — migrations production

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
  workflow_dispatch:

concurrency:
  group: supabase-migrations-production
  cancel-in-progress: false

jobs:
  migrate:
    name: supabase db push
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project & push migrations
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_DB_PASSWORD" ] || [ -z "$SUPABASE_PROJECT_ID" ]; then
            echo "::error::Secrets manquants : définir SUPABASE_ACCESS_TOKEN, SUPABASE_DB_PASSWORD et SUPABASE_PROJECT_ID dans les secrets du dépôt."
            exit 1
          fi
          supabase link --project-ref "$SUPABASE_PROJECT_ID" --password "$SUPABASE_DB_PASSWORD"
          supabase db push --password "$SUPABASE_DB_PASSWORD"
